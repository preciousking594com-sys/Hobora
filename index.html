<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Hobora</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b1120;
      color: white;
    }

    header {
      padding: 20px;
      text-align: center;
      background: #0f172a;
    }

    h1 {
      color: #c9a227;
    }

    .container {
      max-width: 600px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      margin-top: 15px;
      border-radius: 10px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 6px;
      border: none;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      background: #c9a227;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }

    .community {
      background: #0f172a;
      padding: 8px;
      margin-top: 8px;
      border-radius: 6px;
    }
  </style>
</head>

<body>

<header>
  <h1>🌍 Hobora</h1>
  <p>Global Community Platform</p>
</header>

<div class="container">

  <div class="card">
    <h3>Create Community</h3>
    <input id="name" placeholder="Enter community name..." />
    <button onclick="createCommunity()">Create</button>
  </div>

  <div class="card">
    <h3>Communities</h3>
    <div id="list"></div>
  </div>

</div>

<script>
  const supabaseUrl = "https://sodqdogmayvzlekiclay.supabase.co";

  // 👇👇👇 PUT YOUR KEY HERE 👇👇👇
  const supabaseKey = eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNvZHFkb2dtYXl2emxla2ljbGF5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4MjE0NjMsImV4cCI6MjA5NjM5NzQ2M30.PKchgOQnHQZykpI3yhobEzusC58pjooimiKBoE3D-rk

  const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

  async function createCommunity() {
    const name = document.getElementById("name").value.trim();
    if (!name) return;

    const { error } = await supabase
      .from("communities")
      .insert([{ name }]);

    if (error) {
      alert("Error: " + error.message);
      console.log(error);
      return;
    }

    document.getElementById("name").value = "";
    loadCommunities();
  }

  async function loadCommunities() {
    const { data, error } = await supabase
      .from("communities")
      .select("*");

    if (error) {
      console.log(error);
      return;
    }

    document.getElementById("list").innerHTML =
      (data || []).map(c => `<div class="community">📌 ${c.name}</div>`).join("");
  }

  loadCommunities();
</script>

</body>
</html>
